version: '3.8'

services:

  backend:
    build: .
    container_name: rag-backend
    env_file:
      - .env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - API_URL=http://backend:8000
    container_name: rag-frontend
    ports:
      - "8501:8501"
    env_file:
      - .env
    depends_on:
      - backend